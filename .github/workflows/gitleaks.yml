name: Gitleaks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is not required for public repositories.
