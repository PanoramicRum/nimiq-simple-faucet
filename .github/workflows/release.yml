name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist.'
        required: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: panoramicrum/nimiq-simple-faucet
  CHART_OCI_REGISTRY: oci://ghcr.io/panoramicrum/charts

jobs:
  build-and-publish:
    name: Build, test, publish image + packages + chart
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      image-digest: ${{ steps.docker.outputs.digest }}
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v6.0.0
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4.1.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install deps
        run: pnpm install --frozen-lockfile=false

      - name: Build
        run: pnpm turbo run build

      - name: Install Playwright browsers
        run: pnpm test:e2e:install

      - name: Test (unit + e2e)
        run: pnpm turbo run test

      - uses: docker/setup-qemu-action@v3.2.0
      - uses: docker/setup-buildx-action@v3.7.1

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        id: docker
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.resolve.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.resolve.outputs.tag }}
          provenance: true
          sbom: true

      - name: Publish npm packages (public @nimiq-faucet/*)
        env:
          # Auth handled by Trusted Publishing (npm OIDC). The job-level
          # `id-token: write` permission lets npm mint the exchange token
          # automatically — no NPM_TOKEN required. Provenance attestation
          # is produced for every published tarball.
          #
          # Trusted Publishers are configured per-package on npmjs.com:
          #   Package > Settings > Trusted Publishers > GitHub Actions
          #     Organization: PanoramicRum
          #     Repository:   nimiq-simple-faucet
          #     Workflow:     release.yml
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          set -euo pipefail
          # Consume pending changesets into version bumps + CHANGELOG.
          pnpm changeset version || true
          # Publish only packages under the @nimiq-faucet scope. Internal
          # @faucet/* packages carry "private": true and are skipped by npm.
          pnpm changeset publish

      - name: Package Helm chart
        run: |
          set -euo pipefail
          helm version
          helm dependency update deploy/helm
          helm package deploy/helm --destination dist/helm
          ls -la dist/helm

      - name: Log in to OCI registry for Helm
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} --password-stdin

      - name: Push Helm chart to OCI
        run: |
          set -euo pipefail
          for pkg in dist/helm/*.tgz; do
            helm push "$pkg" ${{ env.CHART_OCI_REGISTRY }}
          done

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: helm-chart
          path: dist/helm/*.tgz
          retention-days: 30

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build-and-publish
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6.0.0
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4.1.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile=false

      - name: Extract CHANGELOG fragment for this tag
        id: fragment
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.build-and-publish.outputs.tag }}"
          VERSION="${TAG#v}"
          FRAGMENT=$(awk -v v="$VERSION" '
            $0 ~ "^## "v"(\\b| )" { flag=1; print; next }
            flag && /^## / { exit }
            flag { print }
          ' CHANGELOG.md || true)
          {
            echo "body<<__EOF__"
            if [ -z "$FRAGMENT" ]; then
              echo "Release $TAG"
              echo ""
              echo "No changeset fragment was found — this is typically the first tag or a republish."
            else
              printf "%s" "$FRAGMENT"
            fi
            echo ""
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.0.8
        with:
          tag_name: ${{ needs.build-and-publish.outputs.tag }}
          name: ${{ needs.build-and-publish.outputs.tag }}
          body: ${{ steps.fragment.outputs.body }}
          prerelease: ${{ contains(needs.build-and-publish.outputs.tag, '-rc') || contains(needs.build-and-publish.outputs.tag, '-beta') || contains(needs.build-and-publish.outputs.tag, '-alpha') }}
          draft: false
          generate_release_notes: false

  openapi-freeze:
    name: Freeze OpenAPI spec for this release
    runs-on: ubuntu-latest
    needs: build-and-publish
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v6.0.0
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4.1.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile=false

      - name: Regenerate OpenAPI spec from source
        # The spec is derived from Zod schemas + route registrations, so
        # we don't need a running container here — we can (re)generate it
        # directly from TypeScript. This avoids flaky container boot +
        # driver-init dependencies that the old image-pull approach had.
        run: |
          set -euo pipefail
          pnpm turbo run build --filter=@faucet/server
          pnpm -F @faucet/server freeze:openapi

      - name: Create PR with frozen spec
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          # Explicit base because the workflow runs on a tag (detached
          # HEAD); without this, create-pull-request errors out.
          base: main
          branch: release/openapi-${{ needs.build-and-publish.outputs.tag }}
          commit-message: "chore(openapi): freeze spec for ${{ needs.build-and-publish.outputs.tag }}"
          title: "chore(openapi): freeze spec for ${{ needs.build-and-publish.outputs.tag }}"
          body: |
            Automated regeneration of `packages/openapi/openapi.{yaml,json}`
            from source for the `${{ needs.build-and-publish.outputs.tag }}`
            release. Merge if the diff looks sensible; close otherwise.
          add-paths: |
            packages/openapi/openapi.yaml
            packages/openapi/openapi.json
          labels: |
            release
            openapi
