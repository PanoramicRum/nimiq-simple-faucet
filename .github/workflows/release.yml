name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist.'
        required: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: panoramicrum/nimiq-simple-faucet
  CHART_OCI_REGISTRY: oci://ghcr.io/panoramicrum/charts

jobs:
  build-and-publish:
    name: Build, test, publish image + packages + chart
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      image-digest: ${{ steps.docker.outputs.digest }}
    steps:
      # Audit finding #007 / issue #93: SHA-pin every action so a tag
      # rewrite at the upstream cannot silently swap the binary.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      # Audit finding #014 / issue #100: validate workflow_dispatch tag
      # input. Without this, an actor with workflow_dispatch permission can
      # supply an arbitrary string that ends up interpolated into shell
      # contexts (image tags, helm push, release body). Two-step check:
      #   1. SemVer-shaped regex — refuse anything that isn't `vX.Y.Z[...]`.
      #   2. `git rev-parse --verify` against the annotated tag — refuse
      #      tags that don't actually exist in the repo.
      - name: Resolve tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
              echo "::error::Tag '$tag' does not match the SemVer pattern vX.Y.Z[-prerelease]"
              exit 1
            fi
            if ! git rev-parse --verify --quiet "refs/tags/$tag^{tag}" >/dev/null \
              && ! git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
              echo "::error::Tag '$tag' does not exist in the repository"
              exit 1
            fi
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          # setup-node v5 auto-detects pnpm from package.json#packageManager
          # and invokes it during setup. We install pnpm via corepack in
          # the next step, so disable the auto-cache here.
          package-manager-cache: false

      - name: Activate pnpm via corepack
        run: |
          corepack enable
          corepack install -g pnpm@$(node -p "require('./package.json').packageManager.split('@')[1]")

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build

      - name: Install Playwright browsers
        run: pnpm test:e2e:install

      - name: Test (unit + e2e)
        run: pnpm turbo run test

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        id: docker
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.resolve.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.resolve.outputs.tag }}
          provenance: true
          sbom: true

      - name: Publish npm packages (public @nimiq-faucet/*)
        env:
          # Auth handled by Trusted Publishing (npm OIDC). The job-level
          # `id-token: write` permission lets npm mint the exchange token
          # automatically — no NPM_TOKEN required. Provenance attestation
          # is produced for every published tarball.
          #
          # Trusted Publishers are configured per-package on npmjs.com:
          #   Package > Settings > Trusted Publishers > GitHub Actions
          #     Organization: PanoramicRum
          #     Repository:   nimiq-simple-faucet
          #     Workflow:     release.yml
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          set -euo pipefail
          # Consume pending changesets into version bumps + CHANGELOG.
          pnpm changeset version || true
          # Publish only packages under the @nimiq-faucet scope. Internal
          # @faucet/* packages carry "private": true and are skipped by npm.
          pnpm changeset publish

      - name: Package Helm chart
        run: |
          set -euo pipefail
          helm version
          helm dependency update deploy/helm
          helm package deploy/helm --destination dist/helm
          ls -la dist/helm

      - name: Log in to OCI registry for Helm
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} --password-stdin

      - name: Push Helm chart to OCI
        run: |
          set -euo pipefail
          for pkg in dist/helm/*.tgz; do
            helm push "$pkg" ${{ env.CHART_OCI_REGISTRY }}
          done

      - name: Upload chart artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: helm-chart
          path: dist/helm/*.tgz
          retention-days: 30

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build-and-publish
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          # See above — disable auto pnpm detection; we install via corepack.
          package-manager-cache: false

      - name: Activate pnpm via corepack
        run: |
          corepack enable
          corepack install -g pnpm@$(node -p "require('./package.json').packageManager.split('@')[1]")

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Extract CHANGELOG fragment for this tag
        id: fragment
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.build-and-publish.outputs.tag }}"
          VERSION="${TAG#v}"
          FRAGMENT=$(awk -v v="$VERSION" '
            $0 ~ "^## "v"(\\b| )" { flag=1; print; next }
            flag && /^## / { exit }
            flag { print }
          ' CHANGELOG.md || true)
          {
            echo "body<<__EOF__"
            if [ -z "$FRAGMENT" ]; then
              echo "Release $TAG"
              echo ""
              echo "No changeset fragment was found — this is typically the first tag or a republish."
            else
              printf "%s" "$FRAGMENT"
            fi
            echo ""
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ needs.build-and-publish.outputs.tag }}
          name: ${{ needs.build-and-publish.outputs.tag }}
          body: ${{ steps.fragment.outputs.body }}
          prerelease: ${{ contains(needs.build-and-publish.outputs.tag, '-rc') || contains(needs.build-and-publish.outputs.tag, '-beta') || contains(needs.build-and-publish.outputs.tag, '-alpha') }}
          draft: false
          generate_release_notes: false

  openapi-freeze:
    name: Freeze OpenAPI spec for this release
    runs-on: ubuntu-latest
    needs: build-and-publish
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          # See above — disable auto pnpm detection; we install via corepack.
          package-manager-cache: false

      - name: Activate pnpm via corepack
        run: |
          corepack enable
          corepack install -g pnpm@$(node -p "require('./package.json').packageManager.split('@')[1]")

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Regenerate OpenAPI spec from source
        # The spec is derived from Zod schemas + route registrations, so
        # we don't need a running container here — we can (re)generate it
        # directly from TypeScript. This avoids flaky container boot +
        # driver-init dependencies that the old image-pull approach had.
        run: |
          set -euo pipefail
          pnpm turbo run build --filter=@faucet/server
          pnpm -F @faucet/server freeze:openapi

      - name: Create PR with frozen spec
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          # Explicit base because the workflow runs on a tag (detached
          # HEAD); without this, create-pull-request errors out.
          base: main
          branch: release/openapi-${{ needs.build-and-publish.outputs.tag }}
          commit-message: "chore(openapi): freeze spec for ${{ needs.build-and-publish.outputs.tag }}"
          title: "chore(openapi): freeze spec for ${{ needs.build-and-publish.outputs.tag }}"
          body: |
            Automated regeneration of `packages/openapi/openapi.{yaml,json}`
            from source for the `${{ needs.build-and-publish.outputs.tag }}`
            release. Merge if the diff looks sensible; close otherwise.
          add-paths: |
            packages/openapi/openapi.yaml
            packages/openapi/openapi.json
          labels: |
            release
            openapi
