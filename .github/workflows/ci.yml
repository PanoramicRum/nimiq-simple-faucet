name: CI

on:
  push:
    branches: [main]
  pull_request:

# Audit finding #013 / issue #99: minimal default permissions, escalate
# per-job as needed. CodeQL / Trivy / sbom each declare their own
# `permissions:` block where they need write access.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Audit finding #007 / issue #93: SHA-pin every action so a tag
      # rewrite at the upstream cannot silently swap the binary. Tags
      # listed in the trailing comment for the human reader; Dependabot
      # bumps both the SHA and the comment together.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          # setup-node v5 auto-detects pnpm from package.json#packageManager
          # and invokes it during setup. We install pnpm via corepack in
          # the next step, so disable the auto-cache here to avoid the
          # "Unable to locate executable file: pnpm" failure.
          package-manager-cache: false
      - name: Activate pnpm via corepack (uses packageManager pin)
        run: |
          corepack enable
          corepack install -g pnpm@$(node -p "require('./package.json').packageManager.split('@')[1]")
          pnpm --version

      # Supply-chain guard (audit finding #004 / issue #90): refuse to
      # install if any other workflow or the Dockerfile invokes pnpm with
      # lockfile integrity disabled. The previous behaviour silently let
      # package.json and pnpm-lock.yaml disagree at install time, which
      # defeats the lockfile and opens an ephemeral install-time-resolution
      # window for tampered dependencies.
      #
      # We deliberately exclude ci.yml from its own grep so this step name
      # and its surrounding documentation aren't false positives.
      - name: Forbid pnpm install with --frozen-lockfile=false
        run: |
          hits=$(grep -rEln '\-\-frozen-lockfile=false' .github/ deploy/ \
            --exclude=ci.yml || true)
          if [ -n "$hits" ]; then
            echo "::error::--frozen-lockfile=false found in: $hits"
            echo "::error::Lockfile integrity must not be disabled. See audit finding #004 (#90)."
            exit 1
          fi

      - run: pnpm install --frozen-lockfile

      # Audit finding #027 / issue #107: fail the build on any unpatched
      # CVE at moderate severity or above. Transitive bumps go through
      # `pnpm.overrides` in the root package.json so the lockfile stays
      # the source of truth. Run before lint/test so a CVE failure can't
      # be hidden behind unrelated test flakes.
      - name: pnpm audit (moderate+)
        run: pnpm audit --audit-level=moderate

      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test --if-present

      # Install Playwright browsers + run the e2e suite as part of CI.
      - name: Install Playwright browsers
        run: pnpm test:e2e:install
      - name: E2E tests
        run: pnpm test:e2e

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Build image (single-arch, loadable)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: nimiq-faucet:ci

      # Boot the built image and verify the server actually starts and
      # serves /healthz. Catches regressions like the one in issue #33
      # (missing native bindings after pnpm deploy --ignore-scripts).
      - name: Smoke-test the image
        # Purpose: catch regressions where the image can't start at all
        # (e.g. missing native bindings, broken deploy tree, crashing
        # boot). The wasm signer needs a private key to initialise —
        # we give it a throwaway random one; it will try to reach
        # testnet seed peers and usually achieves healthz within ~60s.
        # If consensus takes longer than the timeout the smoke test
        # instead checks that the container is still alive and hasn't
        # crashed on a known regression (binding missing, DB init etc.).
        run: |
          set -euo pipefail
          docker run -d --name smoke -p 18080:8080 \
            -e FAUCET_DEV=1 \
            -e FAUCET_TLS_REQUIRED=false \
            -e FAUCET_SIGNER_DRIVER=wasm \
            -e FAUCET_PRIVATE_KEY="$(openssl rand -hex 32)" \
            -e FAUCET_ADMIN_PASSWORD="$(openssl rand -hex 16)" \
            -e FAUCET_KEY_PASSPHRASE="$(openssl rand -hex 16)" \
            -e FAUCET_CORS_ORIGINS='*' \
            nimiq-faucet:ci
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:18080/healthz >/dev/null 2>&1; then
              echo "healthz OK after ~${i}x2s"
              docker stop smoke >/dev/null
              exit 0
            fi
            # Fail fast if the container is dead. Issue #119: the
            # `@nimiq/core` WASM client panics intermittently with
            # `'time not implemented on this platform'` shortly after
            # the testnet handshake (~30% of boots). That's an upstream
            # bug, not a regression in this repo, so when we see exactly
            # that panic in the logs we downgrade to a CI warning instead
            # of failing the build. Other crashes (missing native bindings,
            # DB init failure) still fail hard — those ARE our problem.
            if ! docker ps --format '{{.Names}}' | grep -q '^smoke$'; then
              logs="$(docker logs smoke 2>&1 || true)"
              if printf '%s' "$logs" | grep -q "time not implemented on this platform"; then
                echo "::warning::WASM signer hit the upstream #119 panic during testnet handshake. Tracking issue: https://github.com/PanoramicRum/nimiq-simple-faucet/issues/119"
                printf '%s\n' "$logs" | tail -40
                exit 0
              fi
              echo "::error::container exited early — this is the regression we care about"
              printf '%s\n' "$logs"
              exit 1
            fi
            sleep 2
          done
          echo "healthz never returned 200 within 120s. Container log follows:"
          docker logs smoke
          # The container is still alive, so we didn't regress on boot.
          # Consensus/network flake — warn but don't fail.
          echo "WARN: image boots but did not reach healthz in 120s (likely flaky seed-peer sync)."
          exit 0

  examples-build:
    # Issue #115 / #116: prove that `docker build` against each example
    # Dockerfile actually completes from the repo root. The two original
    # examples used a deps-only-cache pattern that silently broke against
    # the workspace lockfile, and the root .dockerignore excluded
    # `examples/` so plain builds couldn't find their own context.
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Build vue-claim-page example image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: examples/vue-claim-page/Dockerfile
          push: false
          load: false
          platforms: linux/amd64
          tags: example-vue-claim:ci
      - name: Build nextjs-claim-page example image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: examples/nextjs-claim-page/Dockerfile
          push: false
          load: false
          platforms: linux/amd64
          tags: example-nextjs-claim:ci

  compose-smoke:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Proves the compose Quick Start from deploy/compose/.env.example
      # actually boots the faucet service cleanly. Would have caught:
      #   - #39 (missing FAUCET_DEV=1 crashed the container on first boot)
      #   - pre-v1.1.3 regressions where the RPC driver's init() crashed
      #     the container if it couldn't reach the configured RPC URL.
      #
      # As of v1.1.3, both signer drivers decouple init() from the
      # Fastify listener (readyPromise pattern) — so /healthz comes up
      # immediately even if the configured RPC node is unreachable.
      # /readyz would return 503 until RPC becomes reachable, but
      # /healthz (liveness) doesn't care. That means we can assert the
      # faucet service alone boots cleanly without needing the nimiq
      # service up (end-to-end claim CI is ROADMAP §1.1.2e).
      - name: Boot compose faucet + assert /healthz
        run: |
          set -euo pipefail
          cd deploy/compose
          cp .env.example .env
          sed -i 's|^FAUCET_ADMIN_PASSWORD=.*|FAUCET_ADMIN_PASSWORD=ci-smoke-admin-pw-12|' .env
          sed -i 's|^FAUCET_KEY_PASSPHRASE=.*|FAUCET_KEY_PASSPHRASE=ci-smoke-key-passphrase-16|' .env
          printf '\nFAUCET_PRIVATE_KEY=%s\n' "$(openssl rand -hex 32)" >> .env
          docker compose up -d --build faucet
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/healthz >/dev/null 2>&1; then
              echo "healthz OK after ~${i}x2s"
              echo "--- /readyz ---"
              curl -sS http://localhost:8080/readyz || true
              echo ""
              echo "--- faucet logs (tail) ---"
              docker compose logs faucet | tail -20
              docker compose down
              exit 0
            fi
            state=$(docker compose ps faucet --format '{{.State}}' 2>/dev/null || echo "")
            if [ -n "$state" ] && [ "$state" != "running" ] && [ "$state" != "restarting" ]; then
              echo "faucet container state=$state — likely regression like #39"
              docker compose logs faucet
              docker compose down
              exit 1
            fi
            sleep 2
          done
          echo "healthz never returned 200 within 60s"
          docker compose logs faucet
          docker compose down
          exit 1
