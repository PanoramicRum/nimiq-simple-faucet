name: Deploy Playground to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/playground/**'
      - 'docs/**'
      - 'AGENTS.md'
      - 'START.md'
      - 'CONTRIBUTING.md'
      - 'packages/*/README.md'
      - 'examples/*/README.md'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Audit finding #007 / issue #93: SHA-pin every action so a tag
      # rewrite at the upstream cannot silently swap the binary.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          # See ci.yml — disable auto pnpm detection; we install via corepack.
          package-manager-cache: false

      - name: Activate pnpm via corepack
        run: |
          corepack enable
          corepack install -g pnpm@$(node -p "require('./package.json').packageManager.split('@')[1]")

      - run: pnpm install --frozen-lockfile

      - name: Build playground
        run: pnpm --filter=@nimiq-faucet/playground build

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: apps/playground/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
