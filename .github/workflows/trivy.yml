name: Trivy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '41 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  image-scan:
    name: Build image and scan with Trivy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Audit finding #007 / issue #93: SHA-pin every action so a tag
      # rewrite at the upstream cannot silently swap the binary.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Build image (load into local docker)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: nimiq-faucet:trivy-scan
      - name: Run Trivy vulnerability scanner (SARIF)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: nimiq-faucet:trivy-scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          vuln-type: os,library
          # Skip CVEs with no upstream fix. We address fixable CVEs via
          # `apt-get upgrade` in the Dockerfile's runtime stage.
          ignore-unfixed: true
      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image
      - name: Run Trivy (fail build on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: nimiq-faucet:trivy-scan
          format: table
          severity: CRITICAL,HIGH
          vuln-type: os,library
          exit-code: '1'
          # Skip CVEs with no upstream fix. We address fixable CVEs via
          # `apt-get upgrade` in the Dockerfile's runtime stage.
          ignore-unfixed: true
