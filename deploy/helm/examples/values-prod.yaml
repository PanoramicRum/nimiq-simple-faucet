# Example production values for the Nimiq Simple Faucet Helm chart.
#
# Copy, adjust, and install with:
#   helm install faucet oci://ghcr.io/panoramicrum/charts/nimiq-simple-faucet \
#     --version 1.0.1 \
#     --namespace faucet --create-namespace \
#     -f values-prod.yaml [-f values-secrets-LOCAL.yaml]
#
# Assumptions:
#   - External Secrets Operator is installed and a ClusterSecretStore is ready.
#   - cert-manager + ingress-nginx are installed.
#   - Single-replica SQLite for 1.0.x. Multi-replica with Postgres + Redis
#     lands in a future 1.x (tracked in ROADMAP.md 1.3.x).
#
# See docs/deployment-production.md for the full walkthrough.

image:
  repository: ghcr.io/panoramicrum/nimiq-simple-faucet
  tag: ""              # falls back to Chart.AppVersion
  pullPolicy: IfNotPresent

# NOTE: SQLite is single-writer, so replicaCount must stay at 1 until
# server-side Postgres + Redis support lands. Horizontal scaling is
# tracked in ROADMAP.md 1.3.x.
replicaCount: 1

config:
  network: "main"
  signerDriver: "wasm"
  claimAmountLuna: "100000"
  rateLimitPerMinute: 60
  rateLimitPerIpPerDay: 3
  tlsRequired: true
  helmetCsp: "relaxed-for-ui"
  corsOrigins: "https://your-integrator.example.com"
  extra:
    FAUCET_GEOIP_BACKEND: "maxmind"
    FAUCET_GEOIP_DENY_VPN: "true"
    FAUCET_GEOIP_DENY_TOR: "true"
    # Allowlist by country (ISO-3166-alpha-2, CSV)
    FAUCET_GEOIP_ALLOW_COUNTRIES: "US,CA,GB,DE,FR,ES,IT,BR,AR,MX"

secrets:
  external:
    enabled: true
    secretStoreRef:
      name: "cluster-secret-store"
      kind: "ClusterSecretStore"
    refreshInterval: "1h"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "10"
  hosts:
    - host: faucet.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: faucet-tls
      hosts:
        - faucet.example.com

# SQLite in a PVC — the supported backend today.
persistence:
  enabled: true
  size: 10Gi
  storageClass: ""   # set to a non-volatile StorageClass in prod

# Postgres + Redis — NOT yet functional at the server layer on 1.0.x.
# Tracked in ROADMAP.md 1.3.x. Leave `enabled: false` until further notice.
postgresql:
  enabled: false
redis:
  enabled: false

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Disabled until multi-replica is supported (requires Postgres backend).
autoscaling:
  enabled: false

# Restrict egress to what the faucet actually needs.
networkPolicy:
  enabled: true
  # Policy JSON omitted here — inherit from chart defaults or customize.
