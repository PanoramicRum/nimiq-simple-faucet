# Example production values for the Nimiq Simple Faucet Helm chart.
#
# Copy, adjust, and install with:
#   helm install faucet oci://ghcr.io/panoramicrum/charts/nimiq-simple-faucet \
#     --version 1.0.1 \
#     --namespace faucet --create-namespace \
#     -f values-prod.yaml [-f values-secrets-LOCAL.yaml]
#
# Assumptions:
#   - External Secrets Operator is installed and a ClusterSecretStore is ready.
#   - cert-manager + ingress-nginx are installed.
#   - Postgres + Redis enabled for production (multi-replica ready since v1.5.0).
#
# See docs/deployment-production.md for the full walkthrough.

image:
  repository: ghcr.io/panoramicrum/nimiq-simple-faucet
  tag: ""              # falls back to Chart.AppVersion
  pullPolicy: IfNotPresent

# With Postgres + Redis enabled (below), multiple replicas are supported.
replicaCount: 2

config:
  network: "main"
  signerDriver: "wasm"
  claimAmountLuna: "100000"
  rateLimitPerMinute: 60
  rateLimitPerIpPerDay: 3
  tlsRequired: true
  helmetCsp: "relaxed-for-ui"
  corsOrigins: "https://your-integrator.example.com"
  extra:
    FAUCET_GEOIP_BACKEND: "maxmind"
    FAUCET_GEOIP_DENY_VPN: "true"
    FAUCET_GEOIP_DENY_TOR: "true"
    # Allowlist by country (ISO-3166-alpha-2, CSV)
    FAUCET_GEOIP_ALLOW_COUNTRIES: "US,CA,GB,DE,FR,ES,IT,BR,AR,MX"

secrets:
  external:
    enabled: true
    secretStoreRef:
      name: "cluster-secret-store"
      kind: "ClusterSecretStore"
    refreshInterval: "1h"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "10"
  hosts:
    - host: faucet.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: faucet-tls
      hosts:
        - faucet.example.com

# SQLite in a PVC — the supported backend today.
persistence:
  enabled: true
  size: 10Gi
  storageClass: ""   # set to a non-volatile StorageClass in prod

# Postgres + Redis — production-grade backend since v1.5.0.
# Set DATABASE_URL and REDIS_URL in config.extra or via External Secrets.
postgresql:
  enabled: true
  auth:
    postgresPassword: ""  # set via secret
    username: faucet
    password: ""          # set via secret
    database: faucet
  primary:
    persistence:
      enabled: true
      size: 20Gi
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# HPA — scale based on CPU. Requires Postgres + Redis enabled above.
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# Restrict egress to what the faucet actually needs.
networkPolicy:
  enabled: true
  # Policy JSON omitted here — inherit from chart defaults or customize.
