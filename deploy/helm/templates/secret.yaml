{{- /*
Inline fallback Secret.
Only rendered when ExternalSecrets is disabled AND the operator supplied
`secrets.values` in an override file. Never commit plaintext into values.yaml.
*/ -}}
{{- if and (not .Values.secrets.external.enabled) .Values.secrets.values }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nimiq-simple-faucet.secretName" . }}
  labels:
    {{- include "nimiq-simple-faucet.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $k, $v := .Values.secrets.values }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
