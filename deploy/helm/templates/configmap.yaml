apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nimiq-simple-faucet.fullname" . }}
  labels:
    {{- include "nimiq-simple-faucet.labels" . | nindent 4 }}
data:
  FAUCET_HOST: "0.0.0.0"
  FAUCET_PORT: {{ .Values.service.port | quote }}
  FAUCET_NETWORK: {{ .Values.config.network | quote }}
  FAUCET_SIGNER_DRIVER: {{ .Values.config.signerDriver | quote }}
  FAUCET_CLAIM_AMOUNT_LUNA: {{ .Values.config.claimAmountLuna | quote }}
  FAUCET_RATE_LIMIT_PER_MINUTE: {{ .Values.config.rateLimitPerMinute | quote }}
  FAUCET_RATE_LIMIT_PER_IP_PER_DAY: {{ .Values.config.rateLimitPerIpPerDay | quote }}
  FAUCET_TLS_REQUIRED: {{ .Values.config.tlsRequired | quote }}
  FAUCET_HELMET_CSP: {{ .Values.config.helmetCsp | quote }}
  {{- with .Values.claimUi.theme }}
  FAUCET_CLAIM_UI_THEME: {{ . | quote }}
  {{- end }}
  {{- if .Values.config.corsOrigins }}
  FAUCET_CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  {{- else }}
  {{- fail "config.corsOrigins must be set explicitly; use \"*\" for dev only" }}
  {{- end }}
  FAUCET_DATA_DIR: "/data"
  {{- if .Values.postgresql.enabled }}
  DATABASE_URL: {{ printf "postgresql://%s@%s-postgresql:5432/%s" .Values.postgresql.auth.username (include "nimiq-simple-faucet.fullname" .) .Values.postgresql.auth.database | quote }}
  {{- end }}
  {{- if .Values.redis.enabled }}
  REDIS_URL: {{ printf "redis://%s-redis-master:6379" (include "nimiq-simple-faucet.fullname" .) | quote }}
  {{- end }}
  {{- with .Values.config.extra }}
  {{- range $k, $v := . }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
