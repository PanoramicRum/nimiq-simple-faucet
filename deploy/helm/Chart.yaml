apiVersion: v2
name: nimiq-simple-faucet
description: Reusable self-hosted Nimiq faucet / payout service
type: application
# Chart version; bump on chart changes regardless of appVersion.
version: "1.8.1"
# Version of the application image shipped by default.
appVersion: "1.8.1"
kubeVersion: ">=1.28.0-0"
home: https://github.com/PanoramicRum/nimiq-simple-faucet
sources:
  - https://github.com/PanoramicRum/nimiq-simple-faucet
maintainers:
  - name: Nimiq Simple Faucet Maintainers
    url: https://github.com/PanoramicRum/nimiq-simple-faucet
keywords:
  - nimiq
  - faucet
  - payout
  - crypto

dependencies:
  - name: postgresql
    version: "15.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
    tags:
      - faucet-db
  - name: redis
    version: "20.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
    tags:
      - faucet-cache
