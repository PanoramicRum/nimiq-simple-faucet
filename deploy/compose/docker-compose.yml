# SQLite is the supported backend today; the faucet persists to the
# `faucet-data` volume at /data/faucet.db. The Postgres + Redis services
# below remain defined but are gated behind the `postgres` profile —
# they'll be usable once server-side Postgres support lands (tracked in
# ROADMAP.md 1.3.x).
services:
  faucet:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: nimiq-faucet:dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    # `.env` is optional so the `nimiq` service can be started on its own
    # (e.g. for smoke testing) without first copying `.env.example`.
    env_file:
      - path: .env
        required: false
    environment:
      FAUCET_NETWORK: ${FAUCET_NETWORK:-test}
      FAUCET_SIGNER_DRIVER: ${FAUCET_SIGNER_DRIVER:-rpc}
      # When the `local-node` profile is active, the `nimiq` service below
      # answers on `http://nimiq:8648`. Otherwise override FAUCET_RPC_URL via
      # .env to point at an external Albatross RPC endpoint.
      FAUCET_RPC_URL: ${FAUCET_RPC_URL:-http://nimiq:8648}
      # Local-trial mode. Defaults to 0 so a raw `docker-compose.yml`
      # without `.env` boots in production-hardening mode. Local trials
      # opt in via `FAUCET_DEV=1` in `.env.example → .env`.
      FAUCET_DEV: ${FAUCET_DEV:-0}
      # DATABASE_URL and REDIS_URL intentionally unset by default — the
      # server uses SQLite at /data/faucet.db and in-memory rate-limit
      # counters. Override via .env once server-side Postgres/Redis lands
      # (or to point at an external managed instance you run yourself).
    volumes:
      - faucet-data:/data

  # Postgres — NOT yet consumed by the server. Gated behind the `postgres`
  # profile. Start with: `docker compose --profile postgres up -d` once
  # server-side Postgres support is implemented.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-faucet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faucet}
      POSTGRES_DB: ${POSTGRES_DB:-faucet}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faucet"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Redis — same caveat as postgres: defined but not yet consumed by the
  # server. Gated behind the `postgres` profile.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["postgres"]

  # Optional local Nimiq testnet node. Enabled via the `local-node` profile:
  #   docker compose --profile local-node up -d
  # See deploy/compose/nimiq-node/README.md for details.
  nimiq:
    image: ghcr.io/nimiq/core-rs-albatross:1.4.0-pre1
    profiles: ["local-node"]
    restart: unless-stopped
    # The image's default CMD (`nimiq-client`) reads `/home/nimiq/.nimiq/client.toml`
    # automatically; no `command:` override is needed.
    volumes:
      - ./nimiq-node/client.toml:/home/nimiq/.nimiq/client.toml:ro
      - nimiq-data:/home/nimiq/.nimiq
    # RPC (8648) intentionally not published to the host by default —
    # the faucet reaches it on the compose network as `http://nimiq:8648`.
    # Uncomment to expose for local debugging (e.g. curl from the host):
    # ports:
    #   - "127.0.0.1:8648:8648"
    # P2P port must be reachable for the node to sync:
    ports:
      - "8443:8443"

volumes:
  faucet-data:
  postgres-data:
  nimiq-data:
