# Example services — extends the main faucet stack.
#
# Usage (from repo root):
#   docker compose -f deploy/compose/docker-compose.yml -f examples/docker-compose.yml up --build
#
# Individual example:
#   docker compose -f deploy/compose/docker-compose.yml -f examples/docker-compose.yml up --build example-vue

services:
  example-nextjs:
    build:
      context: ..
      dockerfile: examples/nextjs-claim-page/Dockerfile
      args:
        NEXT_PUBLIC_FAUCET_URL: http://localhost:8080
    ports:
      - "3001:3000"
    depends_on:
      - faucet

  example-vue:
    build:
      context: ..
      dockerfile: examples/vue-claim-page/Dockerfile
      args:
        VITE_FAUCET_URL: http://localhost:8080
    ports:
      - "3002:80"
    depends_on:
      - faucet

  example-capacitor:
    build:
      context: ..
      dockerfile: examples/capacitor-mobile-app/Dockerfile
      args:
        VITE_FAUCET_URL: http://localhost:8080
    ports:
      - "3003:80"
    depends_on:
      - faucet

  example-go:
    build:
      context: ..
      dockerfile: examples/go-backend-integration/Dockerfile
    ports:
      - "3005:8081"
    environment:
      FAUCET_URL: http://faucet:8080
    depends_on:
      - faucet

  example-flutter:
    build:
      context: ..
      dockerfile: examples/flutter-mobile-app/Dockerfile
    environment:
      FAUCET_URL: http://faucet:8080
      CLAIM_ADDRESS: "NQ00 0000 0000 0000 0000 0000 0000 0000 0000"
    depends_on:
      - faucet
    restart: "no"
