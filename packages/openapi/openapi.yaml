    post:
      tags:
        - Admin
      summary: "Dev-only: wipe all faucet state (password-protected)"
      description: Requires FAUCET_DEV=1 and FAUCET_ADMIN_PASSWORD in the request
        body. Returns 404 in production.
      requestBody:
        content:
